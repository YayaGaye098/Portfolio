services:
  - type: web
    name: portfolio-admin
    env: node
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: VISITOR_HASH_SALT
        sync: false
      - key: CONTACT_HASH_SALT
        sync: false
